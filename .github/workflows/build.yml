name: Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build Application
      run: msbuild MetaDataStringEditor/MetaDataStringEditor.csproj -p:Configuration=Release -p:Platform="AnyCPU"

    - name: Upload Executable
      uses: actions/upload-artifact@v4
      with:
        name: MetaDataStringEditor
        path: MetaDataStringEditor/bin/Release/MetaDataStringEditor.exe
